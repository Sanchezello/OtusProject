services:
  phpmyadmin-debug:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-debug
    environment:
      PMA_HOST: db-debug
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: admin
    ports:
      - '8889:80'
    depends_on:
      db-debug:
        condition: service_healthy
    networks:
      - debug-network

  db-debug:
    image: mysql:5.7
    container_name: mysql_db-debug
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: prestashop
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - db_data-debug:/var/lib/mysql
    networks:
      - debug-network

  prestashop-debug:
    image: prestashop/prestashop:9-apache
    container_name: prestashop-debug
    restart: always
    ports:
      - '8082:80'
    environment:
      DB_SERVER: db-debug
      DB_NAME: prestashop
      DB_USER: root
      DB_PASSWORD: admin
      DB_PREFIX: ps_
      PS_INSTALL_AUTO: "1"
      PS_LANGUAGE: en
      PS_COUNTRY: US
      ADMIN_MAIL: admin@example.com
      ADMIN_PASSWD: Admin123!
      PS_FOLDER_ADMIN: administration-debug
      PS_FOLDER_INSTALL: install-debug
      PS_DOMAIN: localhost:8082
    volumes:
      - ps_data-debug:/var/www/html
    depends_on:
      db-debug:
        condition: service_healthy
    networks:
      - debug-network

  prestashop_postinstall-debug:
    image: alpine:3.19
    depends_on:
      - prestashop-debug
    volumes:
      - ps_data-debug:/var/www/html
    restart: "no"
    command: >
      sh -lc '
        apk add --no-cache curl >/dev/null 2>&1 || true;
        echo "Waiting for PrestaShop HTTP to respond...";
        until curl -fsS http://prestashop-debug/ >/dev/null; do sleep 5; done;
        echo "Waiting for config to exist...";
        until [ -f /var/www/html/config/settings.inc.php ] || [ -f /var/www/html/app/config/parameters.php ]; do sleep 2; done;
        echo "Extra grace period...";
        sleep 10;
        echo "Removing install folders...";
        rm -rf /var/www/html/install /var/www/html/install-dev;
        echo "Clearing cache...";
        rm -rf /var/www/html/var/cache/* || true;
        echo "Done."
      '
    networks:
      - debug-network

volumes:
  db_data-debug:
    driver: local
  ps_data-debug:
    driver: local

networks:
  debug-network:
    driver: bridge